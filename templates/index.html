<head>
    <title>Valve Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- valve data -->
    <script>
        window.valveData = {{ valves | tojson }};
    </script>
    <!-- JS Files -->
    <script src="{{ url_for('static', filename='load_map.js') }}"></script>
    <script src="{{ url_for('static', filename='valves.js') }}"></script>
    <script src="{{ url_for('static', filename='valve_cluster.js') }}"></script>
    <script src="{{ url_for('static', filename='pipe.js') }}"></script>
    <script src="{{ url_for('static', filename='history.js') }}"></script>
    <script src="{{ url_for('static', filename='DownloadCSV.js') }}"></script>

    <!-- HTML Elements -->
    <button id="history_Button" onclick="getHistory()">History</button>

    <div id="history-panel" class="history-panel">
        <div class="history-control">
            <label for="valveFilter">Valve</label>
            <select id="valveFilter" onchange="filterValves()">
                <option value="all">All</option>
                {% for valve in valves %}
                    <option value="{{ valve.name }}">{{ valve.name }}</option>
                {% endfor %}
            </select>
            <div id="filterOptions-State">
                <label>Filter State Options...</label>
                <div>
                    <input type="radio" name="filter-state" value="all" checked onchange="filterValves()">
                    <label>All</label>
                </div>
                <div>
                    <input type="radio" name="filter-state" value="Open" onchange="filterValves()">
                    <label>Open</label>
                </div>
                <div>
                    <input type="radio" name="filter-state" value="Closed" onchange="filterValves()">
                    <label>Closed</label>
                </div>
                <div>
                    <input type="radio" name="filter-state" value="Cracked" onchange="filterValves()">
                    <label>Cracked</label>
                </div>
            </div>
            <div id="filerOptions-Type">
                <label>Filter Type Options...</label>
                <div>
                    <input type="radio" name="filter-type" value="all" checked onchange="filterValves()">
                    <label>All</label>
                </div>
                <div>
                    <input type="radio" name="filter-type" value="air" onchange="filterValves()">
                    <label>Air</label>
                </div>
                <div>
                    <input type="radio" name="filter-type" value="water" onchange="filterValves()">
                    <label>Water</label>
                </div>
            </div>



        </div>
        <a href="{{ url_for('download_CSV') }}" class="button">Download CSV</a>
        <div id="history-list"></div>
    </div>

</body>
