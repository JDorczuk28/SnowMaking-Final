<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snowmaking Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='Login_style.css') }}">
</head>
<body>

    <div class="login-card">
        <h2>Valve Control Login</h2>
        <form action="{{ url_for('login') }}" method="POST">
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="submit-btn">Login to Map</button>
        </form>
        <a href="{{ url_for('index') }}" class="back-link">← Return to Map</a>
    </div>

</body>
</html>
